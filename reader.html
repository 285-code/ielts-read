<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IELTS Reader</title>
<style>
:root {
  --bg: #fafaf8;
  --text: #1a1a1a;
  --muted: #666;
  --border: #e0e0e0;
  --accent: #2b5797;
  --accent-light: #e8f0fe;
  --red: #d1453b;
  --yellow: #e8a317;
  --vocab-red-bg: #fca5a5;
  --vocab-yellow-bg: #fde68a;
  --panel-bg: #ffffff;
  --hover-bg: #f0f4fa;
  --syn-s: #dce6f5;   --syn-s-ul: #4b6fa0;
  --syn-v: #fde8d0;  --syn-v-ul: #c0843a;
  --syn-o: #e8d0f5;  --syn-o-ul: #7e5095;
  --syn-p: #f5e0d0;  --syn-p-ul: #b88a5e;
  --syn-dc: #d0f0e8; --syn-dc-ul: #4a8c7a;
  --syn-ac: #f5d0e0; --syn-ac-ul: #b85570;
  --syn-sc: #d0d8f5; --syn-sc-ul: #5565a2;
  --syn-ap: #f0e8d0; --syn-ap-ul: #a8953e;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: Arial, Helvetica, sans-serif; background: var(--bg); color: var(--text); line-height: 1.7; }

/* Layout */
.container { display: flex; max-width: 1400px; margin: 0 auto; min-height: 100vh; }
.left-panel { flex: 2; padding: 40px 50px 80px; max-width: 900px; overflow-y: auto; transition: all 0.2s; }
.right-panel { flex: 1; min-width: 340px; max-width: 420px; background: var(--panel-bg); border-left: 1px solid var(--border); padding: 30px 28px; position: sticky; top: 0; height: 100vh; overflow-y: auto; transition: all 0.2s; }
.right-panel.collapsed { flex: 0; min-width: 0; max-width: 0; padding: 0; overflow: hidden; border-left: none; }
.left-panel.full { flex: 1; max-width: 800px; margin: 0 auto; }
/* Panel toggle */
.panel-toggle { display: flex; align-items: center; justify-content: center; width: 20px; cursor: pointer; background: var(--panel-bg); border-left: 1px solid var(--border); color: #bbb; font-size: 12px; user-select: none; flex-shrink: 0; }
.panel-toggle:hover { background: var(--hover-bg); color: var(--accent); }
.panel-toggle.collapsed { border-left: none; border-right: 1px solid var(--border); }

/* Header */
.header { margin-bottom: 32px; padding-bottom: 20px; border-bottom: 2px solid var(--border); }
.header h1 { font-size: 18px; font-weight: 700; color: var(--accent); letter-spacing: 0.5px; }
.header .meta { font-size: 13px; color: var(--muted); margin-top: 4px; }
.header .meta span { margin-right: 16px; }
.header .header-actions { display: inline-flex; gap: 6px; margin-left: 12px; }
.header .header-actions span { font-size: 12px; cursor: pointer; color: var(--accent); text-decoration: underline; }

/* Article */
.article { font-size: 16px; }
.article p { margin-bottom: 1.2em; text-align: justify; position: relative; }

/* Paragraph marker */
.para-marker { font-size: 11px; color: #999; cursor: pointer; vertical-align: super; user-select: none; margin-right: 2px; }
.para-marker:hover { color: var(--accent); }

/* Sentence marker */
.sent-marker { font-size: 10px; color: #bbb; cursor: pointer; vertical-align: super; user-select: none; margin: 0 2px; }
.sent-marker:hover { color: var(--accent); }
.sent-marker.has-notes { color: var(--accent); font-weight: 700; font-size: 11px; }

/* Word clickable */
.sentence { cursor: default; transition: background 0.15s; border-radius: 2px; padding: 1px 0; }
.sentence.highlight { background: #dce6f5 !important; }
.word-clickable { cursor: pointer; border-radius: 1px; padding: 0 1px; position: relative; }

/* Vocab — background highlight */
.word-clickable.vocab-red { background: var(--vocab-red-bg); }
.word-clickable.vocab-yellow { background: var(--vocab-yellow-bg); }

/* Syntax — underline */
.syn-group.syn-s { text-decoration: underline; text-decoration-color: var(--syn-s-ul); text-underline-offset: 2px; text-decoration-thickness: 2px; text-decoration-skip-ink: none; }
.syn-group.syn-v { text-decoration: underline; text-decoration-color: var(--syn-v-ul); text-underline-offset: 2px; text-decoration-thickness: 2px; text-decoration-skip-ink: none; }
.syn-group.syn-o { text-decoration: underline; text-decoration-color: var(--syn-o-ul); text-underline-offset: 2px; text-decoration-thickness: 2px; text-decoration-skip-ink: none; }
.syn-group.syn-p { text-decoration: underline; text-decoration-color: var(--syn-p-ul); text-underline-offset: 2px; text-decoration-thickness: 2px; text-decoration-skip-ink: none; }
.syn-group.syn-dc { text-decoration: underline; text-decoration-color: var(--syn-dc-ul); text-underline-offset: 2px; text-decoration-thickness: 2px; text-decoration-skip-ink: none; }
.syn-group.syn-ac { text-decoration: underline; text-decoration-color: var(--syn-ac-ul); text-underline-offset: 2px; text-decoration-thickness: 2px; text-decoration-skip-ink: none; }
.syn-group.syn-sc { text-decoration: underline; text-decoration-color: var(--syn-sc-ul); text-underline-offset: 2px; text-decoration-thickness: 2px; text-decoration-skip-ink: none; }
.syn-group.syn-ap { text-decoration: underline; text-decoration-color: var(--syn-ap-ul); text-underline-offset: 2px; text-decoration-thickness: 2px; text-decoration-skip-ink: none; }

/* Inline sentence card */
.sentence-card { margin: 10px 0 14px 12px; padding: 16px 18px; background: #fdfdfc; border: 1px solid var(--border); border-left: 3px solid var(--accent); border-radius: 6px; font-size: 14px; }
.sentence-card .card-sentence { font-size: 15px; line-height: 1.7; margin-bottom: 12px; padding: 8px 0; user-select: text; }
.sentence-card .card-sentence .word-clickable { cursor: pointer; }
.sentence-card .card-label { font-size: 11px; color: #999; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
.sentence-card .card-notes { width: 100%; min-height: 80px; padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; font-family: Arial, sans-serif; line-height: 1.6; resize: vertical; outline: none; transition: border-color 0.15s; margin-bottom: 8px; }
.sentence-card .card-notes:focus { border-color: var(--accent); }
.sentence-card .card-actions { display: flex; gap: 6px; align-items: center; }
.sentence-card .card-actions button { font-size: 12px; padding: 4px 12px; border: 1px solid var(--border); border-radius: 4px; background: white; cursor: pointer; font-family: inherit; transition: all 0.15s; }
.sentence-card .card-actions button:hover { background: var(--accent-light); }
.sentence-card .card-actions button.collected { background: #fef5e0; border-color: #f0d78c; color: #b8860b; }
.card-saved-hint { font-size: 11px; color: var(--accent); opacity: 0; transition: opacity 0.3s; margin-left: 8px; }
.card-saved-hint.show { opacity: 1; }

/* Right panel */
.right-panel h3 { font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
.panel-tabs { display: flex; gap: 0; margin-bottom: 20px; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
.panel-tabs button { flex: 1; padding: 8px 0; border: none; background: #f5f5f3; font-size: 12px; font-family: inherit; cursor: pointer; transition: all 0.15s; }
.panel-tabs button.active { background: var(--accent); color: white; }
.panel-tabs button:not(:last-child) { border-right: 1px solid var(--border); }

/* Vocabulary list */
.vocab-list-item { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid #f0f0f0; font-size: 14px; cursor: pointer; }
.vocab-list-item:hover { background: #f8f8f6; }
.vocab-list-item .level-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.vocab-list-item .word { font-weight: 700; }
.vocab-list-item .context { font-size: 12px; color: var(--muted); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.level-dot.red { background: var(--red); }
.level-dot.yellow { background: var(--yellow); }
.vocab-empty { font-size: 13px; color: var(--muted); text-align: center; padding: 24px 0; }

/* Vocab popup */
.vocab-popup { position: fixed; background: white; border: 1px solid var(--border); border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.15); z-index: 1000; display: none; padding: 8px 10px; min-width: 280px; }
.vocab-popup .popup-section { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; padding: 4px 0; }
.vocab-popup .popup-section + .popup-section { border-top: 1px solid #eee; }
.vocab-popup .popup-label { font-size: 10px; color: #999; text-transform: uppercase; letter-spacing: 0.5px; margin-right: 4px; white-space: nowrap; }
.vocab-popup .color-btn { width: 30px; height: 30px; border-radius: 8px; border: 2px solid transparent; cursor: pointer; transition: all 0.15s; }
.vocab-popup .color-btn:hover { transform: scale(1.15); border-color: #999; }
.vocab-popup .color-btn.active { border-color: #333; box-shadow: 0 0 0 1px #333; }
.vocab-popup .color-btn.red { background: var(--red); }
.vocab-popup .color-btn.yellow { background: var(--yellow); }
.vocab-popup .color-btn.remove { background: #eee; font-size: 12px; line-height: 28px; text-align: center; color: #999; width: auto; padding: 0 8px; }
.vocab-popup .syn-btn { width: 28px; height: 28px; border-radius: 6px; border: 2px solid transparent; cursor: pointer; font-size: 11px; font-weight: 700; transition: all 0.15s; font-family: inherit; }
.vocab-popup .syn-btn:hover { transform: scale(1.15); border-color: #999; }
.vocab-popup .syn-btn.active { border-color: #333; box-shadow: 0 0 0 1px #333; }
.vocab-popup .syn-btn.syn-s { background: var(--syn-s); }
.vocab-popup .syn-btn.syn-v { background: var(--syn-v); }
.vocab-popup .syn-btn.syn-o { background: var(--syn-o); }
.vocab-popup .syn-btn.syn-p { background: var(--syn-p); }
.vocab-popup .syn-btn.syn-dc { background: var(--syn-dc); }
.vocab-popup .syn-btn.syn-ac { background: var(--syn-ac); }
.vocab-popup .syn-btn.syn-sc { background: var(--syn-sc); }
.vocab-popup .syn-btn.syn-ap { background: var(--syn-ap); }
.vocab-popup .multi-toggle { font-size: 11px; color: var(--accent); cursor: pointer; border: 1px solid var(--accent); border-radius: 4px; padding: 2px 8px; background: white; font-family: inherit; margin-left: auto; white-space: nowrap; }
.vocab-popup .hint-input { display: block !important; width: 100% !important; max-width: 100%; padding: 4px 6px; border: 1px solid var(--border); border-radius: 4px; font-size: 12px; font-family: inherit; outline: none; margin-top: 2px; box-sizing: border-box; resize: none; overflow: hidden; min-height: 28px; line-height: 1.5; }
.vocab-popup .hint-input:focus { border-color: var(--accent); }
.vocab-popup .hint-row { display: block !important; }

/* Phrase groups */
.phrase-group { padding-bottom: 1px; border-radius: 2px; }
.phrase-group.phrase-red { background: var(--vocab-red-bg); border-bottom: 3px solid var(--red); }
.phrase-group.phrase-yellow { background: var(--vocab-yellow-bg); border-bottom: 3px solid var(--yellow); }
.phrase-bracket { font-weight: 700; user-select: none; }
.phrase-red .phrase-bracket { color: var(--red); }
.phrase-yellow .phrase-bracket { color: var(--yellow); }
.vocab-popup .multi-toggle.on { background: var(--accent); color: white; }

/* Range selection */
.word-clickable.range-start { outline: 2px dashed var(--accent); outline-offset: 1px; border-radius: 2px; }
.word-clickable.range-selected { background: #dce6f5 !important; border-radius: 2px; }

/* Sentence list */
.sentence-item { padding: 12px 0; border-bottom: 1px solid #f0f0f0; font-size: 13px; cursor: pointer; }
.sentence-item:hover { background: #f8f8f6; }
.sentence-item .s-text { line-height: 1.6; margin-bottom: 4px; }
.sentence-item .s-meta { font-size: 11px; color: var(--muted); display: flex; gap: 8px; flex-wrap: wrap; }
.sentence-item .s-meta .tag { padding: 1px 8px; background: #f0f0f0; border-radius: 10px; font-size: 11px; }

/* Data controls */
.data-controls { margin-top: 24px; padding-top: 16px; border-top: 1px solid var(--border); display: flex; gap: 8px; flex-wrap: wrap; }
.data-controls button { font-size: 12px; padding: 6px 14px; border: 1px solid var(--border); border-radius: 4px; background: white; cursor: pointer; font-family: inherit; }
.data-controls button:hover { background: #f0f0f0; }
.sync-panel { display: none; margin-top: 12px; padding: 12px; background: #f8f9fa; border-radius: 6px; font-size: 12px; }
.sync-panel.open { display: block; }
.sync-panel label { font-weight: 700; display: block; margin-bottom: 4px; color: var(--text); }
.sync-panel .row { display: flex; gap: 6px; align-items: center; margin-bottom: 6px; flex-wrap: wrap; }
.sync-panel input[type="password"] { flex: 1; min-width: 160px; padding: 4px 8px; border: 1px solid var(--border); border-radius: 4px; font-size: 12px; font-family: inherit; }
.sync-panel .status { color: var(--muted); font-size: 11px; }
.sync-panel .status.ok { color: #2e7d32; }
.sync-panel .status.err { color: #c62828; }
.sync-panel .status.busy { color: #e65100; }
.sync-toggle { font-size: 12px; cursor: pointer; color: var(--accent); text-decoration: underline; }

/* Inline edit */
.inline-input { padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px; font-family: Arial, sans-serif; outline: none; transition: border-color 0.15s; }
.inline-input:focus { border-color: var(--accent); }
.edit-textarea { width: 100%; min-height: 400px; padding: 12px 14px; border: 1px solid var(--border); border-radius: 6px; font-size: 15px; font-family: Arial, sans-serif; line-height: 1.7; resize: vertical; outline: none; transition: border-color 0.15s; }
.edit-textarea:focus { border-color: var(--accent); }
.edit-toolbar { display: flex; gap: 8px; align-items: center; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }

/* Modals */
.modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 2000; display: flex; align-items: center; justify-content: center; }
.modal { background: white; border-radius: 12px; width: 580px; max-width: 90vw; max-height: 85vh; display: flex; flex-direction: column; box-shadow: 0 8px 40px rgba(0,0,0,0.2); }
.modal-wider { width: 700px; }
.modal-header { display: flex; justify-content: space-between; align-items: center; padding: 18px 24px; border-bottom: 1px solid var(--border); }
.modal-header h3 { font-size: 16px; font-weight: 700; color: var(--accent); text-transform: none; letter-spacing: 0; border: none; margin: 0; padding: 0; }
.modal-close { background: none; border: none; font-size: 18px; cursor: pointer; color: #999; padding: 4px 8px; border-radius: 4px; }
.modal-close:hover { background: #f0f0f0; }
.modal-body { padding: 20px 24px; overflow-y: auto; flex: 1; }
.modal-section { margin-bottom: 16px; }
.modal-section label { font-size: 13px; font-weight: 700; display: block; margin-bottom: 6px; color: var(--text); }
.modal-section .hint { font-size: 12px; color: var(--muted); font-weight: 400; margin-left: 6px; }
.modal-input { width: 100%; padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 14px; font-family: inherit; outline: none; transition: border-color 0.15s; }
.modal-input:focus { border-color: var(--accent); }
.modal-textarea { width: 100%; border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; font-size: 14px; font-family: Arial, sans-serif; line-height: 1.6; resize: vertical; outline: none; transition: border-color 0.15s; min-height: 200px; }
.modal-textarea:focus { border-color: var(--accent); }
.modal-textarea-sm { min-height: 100px; }
.modal-sentence { font-size: 14px; line-height: 1.7; padding: 12px; background: var(--accent-light); border-radius: 6px; color: var(--text); }
.tag-list { display: flex; flex-wrap: wrap; gap: 6px; }
.tag-list .tag { padding: 4px 12px; border: 1px solid var(--border); border-radius: 14px; font-size: 12px; cursor: pointer; transition: all 0.15s; background: white; user-select: none; }
.tag-list .tag.selected { background: var(--accent); color: white; border-color: var(--accent); }
.modal-error { font-size: 13px; color: var(--red); min-height: 20px; }
.modal-footer { display: flex; justify-content: flex-end; gap: 8px; padding: 14px 24px; border-top: 1px solid var(--border); }
.btn-primary { background: var(--accent); color: white; border: none; padding: 8px 24px; border-radius: 6px; font-size: 14px; cursor: pointer; font-family: inherit; }
.btn-primary:hover { opacity: 0.9; }
.btn-secondary { background: #f0f0f0; color: var(--text); border: none; padding: 8px 24px; border-radius: 6px; font-size: 14px; cursor: pointer; font-family: inherit; }
.btn-secondary:hover { background: #e0e0e0; }

/* Responsive */
@media (max-width: 900px) {
  .container { flex-direction: column; }
  .left-panel { padding: 24px 20px 60px; max-width: 100%; }
  .right-panel { position: static; height: auto; max-width: 100%; border-left: none; border-top: 1px solid var(--border); padding: 20px; }
  .panel-toggle { display: none; }
}

/* Print — clean article only */
@media print {
  .right-panel, .header-actions, .sent-marker, .vocab-popup,
  .modal-overlay, #inlineEdit, #pasteZone, .data-controls,
  .sentence-card, .phrase-bracket, .meta { display: none !important; }
  .left-panel { max-width: 100%; padding: 0; }
  .header { margin-bottom: 8px; padding: 0 0 6px; border-bottom: 1px solid #ccc; }
  .header h1 { font-size: 18px; margin: 0 0 2px; display: flex; justify-content: space-between; align-items: baseline; }
  .header h1::after {
    content: attr(data-source);
    font-size: 12px;
    color: #888;
    font-weight: 400;
    letter-spacing: 0.3px;
  }
  .header::before { display: none; }
  .article { font-size: 16px; line-height: 1.5; padding-top: 0; margin-top: 0; }
  .article::before { display: none; }
  .word-clickable { cursor: text; }
  .word-clickable.vocab-red, .word-clickable.vocab-yellow,
  .phrase-group.phrase-red, .phrase-group.phrase-yellow { background: none !important; border-bottom: none !important; }
  .syn-group { text-decoration: none !important; }
  @page { margin: 1.2cm 2cm; }
}

/* Empty state */
.empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
.empty-state p { font-size: 14px; margin-top: 8px; }

/* Dashboard */
.dash-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; padding-bottom: 16px; border-bottom: 2px solid var(--border); }
.dash-header h1 { font-size: 20px; font-weight: 700; color: var(--accent); }
.dash-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 14px; }
.dash-card { background: var(--panel-bg); border: 1px solid var(--border); border-radius: 10px; padding: 18px 20px; cursor: pointer; transition: all 0.15s; }
.dash-card:hover { border-color: var(--accent); box-shadow: 0 2px 12px rgba(43,87,151,0.12); transform: translateY(-1px); }
.dash-card .dash-source { font-size: 12px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 4px; }
.dash-card .dash-title { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 8px; line-height: 1.4; }
.dash-card .dash-meta { font-size: 11px; color: var(--muted); }
.dash-card .dash-delete { float: right; font-size: 16px; color: #ccc; cursor: pointer; padding: 0 4px; }
.dash-card .dash-delete:hover { color: var(--red); }

/* Review tab */
.review-card { padding: 16px; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 16px; }
.review-sentence { font-size: 15px; line-height: 1.8; padding: 14px 18px; background: var(--accent-light); border-radius: 6px; margin-bottom: 16px; word-break: break-word; }
.review-input-row { display: flex; gap: 8px; margin-bottom: 12px; }
.review-input { flex: 1; padding: 8px 12px; border: 2px solid var(--border); border-radius: 6px; font-size: 15px; font-family: inherit; outline: none; }
.review-input:focus { border-color: var(--accent); }
.review-feedback { margin-top: 8px; font-size: 14px; min-height: 36px; display: flex; align-items: center; flex-wrap: wrap; gap: 8px; }
.review-correct { color: #2e7d32; font-weight: 700; }
.review-incorrect { color: var(--red); font-weight: 700; }
.review-hint { margin-top: 8px; padding: 10px 14px; background: #fef9e7; border-radius: 6px; font-size: 13px; line-height: 1.7; }
.review-hint .hint-chinese { margin-bottom: 4px; color: var(--text); }
.review-hint .hint-first { color: var(--muted); font-size: 15px; font-weight: 700; letter-spacing: 2px; }
/* Review word info with phonetic */
.review-word-info { width:100%; margin-top:4px; padding-top:6px; border-top:1px solid #f0f0f0; font-size:15px; display:flex; align-items:center; gap:8px; }
.review-word-info .word { font-weight:700; color:var(--text); }
.review-phonetic { color:var(--muted); font-size:14px; letter-spacing:0.5px; }
.review-speak-btn { font-size:18px; cursor:pointer; border:none; background:none; padding:2px 6px; border-radius:4px; line-height:1; }
.review-speak-btn:hover { background:var(--accent-light); }
/* Inline hint */
.review-hint-inline { margin-bottom:10px; padding:8px 14px; background:#f8f7f4; border-radius:6px; font-size:13px; line-height:1.7; }
.review-hint-inline .hint-chinese { color:var(--text); margin-bottom:2px; }
.review-hint-inline .hint-first { font-size:16px; font-weight:700; letter-spacing:2px; color:var(--accent); font-family:'Courier New',monospace; }
.review-hint-inline .hint-def { font-size:12px; color:var(--muted); margin-top:2px; }
/* Letter boxes */
.letter-box-container { position:relative; flex:1; display:flex; align-items:center; }
.letter-boxes { display:flex; gap:0; align-items:center; }
.lbox { display:inline-flex; align-items:center; justify-content:center; min-width:13px; font-size:20px; font-weight:400; color:var(--text); border-bottom:2px solid #ccc; padding:0 1px; margin:0; line-height:1; }
.lbox.filled { border-color:var(--accent); color:var(--accent); }

function splitSentences(text) {
  const abbrevs = ['Mr.','Mrs.','Dr.','Prof.','vs.','e.g.','i.e.','etc.','No.','St.','Ave.','dept.'];
  let clean = text;
  abbrevs.forEach(a => { clean = clean.replace(new RegExp(a.replace('.','\\.'),'g'), a.replace('.','<ABBR>')); });
  // Protect decimal numbers (e.g. 1.5 → 1<DOT>5) so they don't split
  clean = clean.replace(/(\d)\.(\d)/g, '$1<DOT>$2');
  const parts = clean.match(/[^.!?]+[.!?]+/g) || [clean];
  return parts.map(s => s.replace(/<ABBR>/g,'.').replace(/<DOT>/g, '.')).map(s => s.trim()).filter(s => s.length > 0);
}

function toRoman(n) {
  const vals = [[10,'X'],[9,'IX'],[5,'V'],[4,'IV'],[1,'I']];
  let r = '';
  for (const [v,s] of vals) { while (n >= v) { r+=s; n-=v; } }
  return r;
}

// ============================================================
// PERSISTENCE — Multi-article Store

let currentArticleId = null;

function getArticleIndex() {
  return JSON.parse(localStorage.getItem('ielts_index') || '{}');
}
function saveArticleIndex(store) {
  localStorage.setItem('ielts_index', JSON.stringify(store));
}
function getArticleStoreKey(id) {
  return 'ielts_article_' + id;
}

function saveFullArticleData() {
  if (!currentArticleId || !articleData) return;
  const data = { article: articleData, vocab: vocabData, sentences: sentenceData, syntax: syntaxData, notes: sentenceNotes };
  localStorage.setItem(getArticleStoreKey(currentArticleId), JSON.stringify(data));
  const store = getArticleIndex();
  if (store[currentArticleId]) {
    store[currentArticleId].modified = todayStr();
    store[currentArticleId].vocabCount = vocabData.length;
    store[currentArticleId].sentCount = sentenceData.length;
    store[currentArticleId].title = articleData.title;
    store[currentArticleId].source = articleData.source || '';
    saveArticleIndex(store);
  }
  localStorage.setItem('ielts_last_article', currentArticleId);
}

function loadArticleFromStore(id) {
  try { return JSON.parse(localStorage.getItem(getArticleStoreKey(id))); } catch(e) { return null; }
}

// Legacy save wrappers — all route to multi-article store

function loadAll() {
  try {
    // Migration from old single-article format
    const oldArticle = localStorage.getItem('ielts_article');
    if (oldArticle && !localStorage.getItem('ielts_index')) {
      const article = JSON.parse(oldArticle);
      const vocab = JSON.parse(localStorage.getItem('ielts_vocab') || '[]');
      const sentences = JSON.parse(localStorage.getItem('ielts_sentences') || '[]');
      const syntax = JSON.parse(localStorage.getItem('ielts_syntax') || '[]');
      const notes = JSON.parse(localStorage.getItem('ielts_sentence_notes') || '{}');
      const source = article.source || 'article-1';
      const id = slugify(source) || 'article-1';
      const store = {};
      store[id] = { id, title: article.title, source: article.source || '', created: todayStr(), modified: todayStr(), vocabCount: vocab.length, sentCount: sentences.length };
      saveArticleIndex(store);
      localStorage.setItem(getArticleStoreKey(id), JSON.stringify({ article, vocab, sentences, syntax, notes }));
      localStorage.setItem('ielts_last_article', id);
      ['ielts_article','ielts_vocab','ielts_sentences','ielts_syntax','ielts_sentence_notes'].forEach(k => localStorage.removeItem(k));
    }

    // Load last opened article
    const store = getArticleIndex();
    const ids = Object.keys(store);
    const lastId = localStorage.getItem('ielts_last_article');
    if (lastId && store[lastId]) {
      currentArticleId = lastId;
      const data = loadArticleFromStore(lastId);
      if (data) {
        articleData = data.article;
        vocabData = data.vocab || [];
        vocabData.forEach(v => { if (v.sentId && !v.sentenceId) { v.sentenceId = v.sentId; delete v.sentId; } });
        sentenceData = data.sentences || [];
        syntaxData = data.syntax || [];
        sentenceNotes = data.notes || {};
        return;
      }
    }
    // No valid article
    articleData = null;
    vocabData = []; sentenceData = []; syntaxData = []; sentenceNotes = {};
  } catch(e) { console.error('loadAll error', e); }
}

function quickImport() {
  const text = document.getElementById('pasteText').value.trim();
  if (!text) { alert('请粘贴文章内容'); return; }
  const paras = parseArticle(text);
  if (!paras.length) { alert('无法识别段落，请用空行分隔'); return; }
  // Title: use user input, fallback to first sentence
  let title = document.getElementById('pasteTitle').value.trim();
  if (!title) {
    const firstSent = paras[0]?.[0] || '';
    title = firstSent.length > 50 ? firstSent.substring(0, 50) + '…' : firstSent;
  }
  let source = document.getElementById('pasteSource').value.trim();
  if (!source) source = todayStr();
  articleData = { title, source, paragraphs: paras };

  // Create new store entry — unique ID with timestamp guard
  const baseId = slugify(source || title || 'article') || 'article';
  let id = baseId;
  const store = getArticleIndex();
  let counter = 1;
  while (store[id]) { id = baseId + '-' + (counter++); }
  store[id] = { id, title, source, created: todayStr(), modified: todayStr(), vocabCount: 0, sentCount: 0 };
  saveArticleIndex(store);
  // Reset data arrays so new article doesn't inherit previous article's data
  vocabData = []; sentenceData = []; syntaxData = []; sentenceNotes = {};
  currentArticleId = id;
  saveFullArticleData();
  localStorage.setItem('ielts_last_article', id);

  document.getElementById('pasteZone').style.display = 'none';
  // Reset paste zone fields for next time
  document.getElementById('pasteTitle').value = '';
  document.getElementById('pasteSource').value = '';
  document.getElementById('pasteText').value = '';
  renderAll();
}

function parseArticle(text) {
  let paras = text.split(/\n\s*\n+/).filter(p => p.trim());
  if (paras.length < 2) {
    const alt = text.split(/\n+/).filter(p => p.trim());
    if (alt.length > 1) paras = alt;
  }
  return paras.map(p => splitSentences(p.trim()));
}

// ============================================================
// AUTO CORRECT
// ============================================================
function autoCorrect() {
  const ta = document.getElementById('inlineText');
  let t = ta.value;
  const fixes = [];
  let count = 0;

  // 1. Fix zero→O letter confusion
  t = t.replace(/\b0([a-z])/g, (m, c) => { fixes.push(`${m}→O${c}`); count++; return 'O' + c; });
  t = t.replace(/([a-z])0/g, (m, c) => { fixes.push(`${m}→${c}O`); count++; return c + 'O'; });

  // 2. Fix 1→l/i confusion
  t = t.replace(/\b1([a-z]{2,})/g, (m, c) => { fixes.push(`${m}→l${c}`); count++; return 'l' + c; });

  // 3. Fix rn→m
  t = t.replace(/rn/g, (m) => { fixes.push('rn→m'); count++; return 'm'; });

  // 4. Remove extra spaces inside words
  t = t.replace(/\b([a-z]) ([a-z])\b/g, (m, a, b) => { fixes.push(`"${m}"→"${a}${b}"`); count++; return a + b; });

  // 5. Fix full-width punctuation
  const FW = '，。！？；：“”‘’（）';
  const HW = ',.!?;:""\'\'()';
  t = t.replace(/[，。！？；：“”‘’（）]/g, (m) => {
    const idx = FW.indexOf(m);
    if (idx >= 0) { fixes.push(`全角→半角: ${m}`); count++; return HW[idx]; }
    return m;
  });

  // 6. Remove spaces before punctuation
  t = t.replace(/\s+([,.!?;:])/g, (m, p) => { fixes.push(`space before ${p}`); count++; return p; });

  // 7. Add space after period if missing
  t = t.replace(/\.([A-Z])/g, (m, c) => { fixes.push(`.${c}→. ${c}`); count++; return '. ' + c; });

  // 8. Remove double spaces
  t = t.replace(/  +/g, (m) => { fixes.push('double space'); count++; return ' '; });

  // 9. Split camelCase / PascalCase
  t = t.replace(/([a-z])([A-Z])/g, (m, a, b) => { fixes.push(`${m} → ${a} ${b}`); count++; return a + ' ' + b; });

  // 10. Segment concatenated words using dictionary (threshold: 7+ chars)
  // Disabled — too aggressive on legitimate words like "upright"

  ta.value = t;
  const msg = count > 0 ? `已修正 ${count} 处问题。\n${fixes.slice(0,10).join('\n')}${fixes.length>10?'\n...':''}` : '未发现需修正的问题。';
  alert(msg);
}

// ============================================================
// RENDER ARTICLE
// ============================================================
function renderAll() {
  const container = document.getElementById('articleContainer');
  const header = document.getElementById('articleHeader');
  if (!articleData) {
    container.innerHTML = '<div class="empty-state"><p style="font-size:32px;margin-bottom:8px;">📖</p><p>还没有文章</p></div>';
    header.style.display = 'none';
    return;
  }
  header.style.display = 'block';
  document.getElementById('articleTitle').textContent = articleData.title;
  document.getElementById('articleSource').textContent = articleData.source || '';
  const totalSents = articleData.paragraphs.reduce((s, p) => s + p.length, 0);
  const totalWords = articleData.paragraphs.reduce((s, p) => s + p.join(' ').split(/\s+/).length, 0);
  document.getElementById('articleMeta').textContent = `${totalSents} sentences · ~${totalWords} words`;
  document.getElementById('articleContainer').dataset.source = articleData.source || '';
  document.getElementById('articleHeader').dataset.source = articleData.source || '';
  document.querySelector('#articleHeader h1').dataset.source = articleData.source || '';
  renderArticle(); renderVocab(); renderSentences();
}

function renderArticle() {
  const container = document.getElementById('articleContainer');
  container.innerHTML = '';
  let sentCount = 0;

  articleData.paragraphs.forEach((sents, pIdx) => {
    const pEl = document.createElement('p');
    const paraNum = pIdx + 1;

    sents.forEach(sentText => {
      sentCount++;
      const sentId = `p${paraNum}-s${sentCount}`;
      const sentSpan = document.createElement('span');
      sentSpan.className = 'sentence';
      sentSpan.dataset.sentId = sentId;
      sentSpan.dataset.para = paraNum;
      sentSpan.dataset.sent = sentCount;

      const parts = sentText.split(/(\s+)/);
      let wordIdx = 0;
      const items = parts.map(part => {
        if (part.trim() === '') return { type: 'space', text: part };
        const clean = part.replace(/[^a-zA-Z]/g,'').toLowerCase();
        if (!clean.length) return { type: 'punct', text: part };
        const vm = vocabData.find(v => !v.wordIndices && v.wordLower === clean && v.sentenceId === sentId);
        const pm = vocabData.find(v => v.wordIndices && v.wordIndices.length > 1 && v.sentenceId === sentId && v.wordIndices.includes(wordIdx));
        const sm = syntaxData.filter(s => s.sentId === sentId && s.wordIndices.includes(wordIdx));
        const item = { type: 'word', text: part, clean, idx: wordIdx, synType: sm.length ? sm[0].type : null, vocabLevel: vm ? vm.level : null, phraseLevel: pm ? pm.level : null, phraseKey: pm ? pm.wordLower + '|' + pm.sentenceId : null };
        wordIdx++;
        return item;
      });

      const makeWordSpan = (item, inPhrase) => {
        const ws = document.createElement('span');
        ws.className = 'word-clickable';
        ws.dataset.w = item.idx;
        ws.dataset.clean = item.clean;
        ws.dataset.sentId = sentId;
        ws.dataset.word = item.text;
        ws.textContent = (!inPhrase && item.vocabLevel) ? syllabify(item.text) : item.text;
        if (!inPhrase && item.vocabLevel) ws.classList.add('vocab-' + item.vocabLevel);
        ws.addEventListener('click', (e) => { e.stopPropagation(); handleWordClick(ws, sentId, sentText, item.clean, item.text, e); });
        return ws;
      };

      // Group contiguous same-type (phrase → syntax → plain word)
      let i = 0;
      while (i < items.length) {
        const item = items[i];
        if (item.type === 'word' && item.phraseKey) {
          // Group contiguous same-phrase words
          let end = i;
          for (let j = i + 1; j < items.length; j++) {
            if (items[j].type !== 'word') continue; // skip spaces & punctuation
            if (items[j].phraseKey === item.phraseKey) { end = j; }
            else { break; }
          }
          const group = document.createElement('span');
          group.className = 'phrase-group phrase-' + (item.phraseLevel || 'red');
          const lb = document.createElement('span'); lb.className = 'phrase-bracket'; lb.textContent = '[';
          const rb = document.createElement('span'); rb.className = 'phrase-bracket'; rb.textContent = ']';
          group.appendChild(lb);
          for (let j = i; j <= end; j++) {
            if (items[j].type === 'word') { group.appendChild(makeWordSpan(items[j], true)); }
            else { group.appendChild(document.createTextNode(items[j].text)); }
          }
          group.appendChild(rb);
          // Wrap syntax groups around phrase if needed
          if (item.synType) { const sg = document.createElement('span'); sg.className = 'syn-group syn-' + item.synType; sg.appendChild(group); sentSpan.appendChild(sg); }
          else { sentSpan.appendChild(group); }
          i = end + 1;
        } else if (item.type === 'word' && item.synType) {
          // Group contiguous same-type syntax words
          let end = i;
          for (let j = i + 1; j < items.length; j++) {
            if (items[j].type === 'word') {
              if (items[j].synType === item.synType) { end = j; }
              else { break; }
            }
          }
          const group = document.createElement('span');
          group.className = 'syn-group syn-' + item.synType;
          for (let j = i; j <= end; j++) {
            if (items[j].type === 'word') { group.appendChild(makeWordSpan(items[j], false)); }
            else { group.appendChild(document.createTextNode(items[j].text)); }
          }
          sentSpan.appendChild(group);
          i = end + 1;
        } else if (item.type === 'word') {
          sentSpan.appendChild(makeWordSpan(item, false));
          i++;
        } else {
          sentSpan.appendChild(document.createTextNode(item.text));
          i++;
        }
      }

      pEl.appendChild(sentSpan);

      // Sentence marker [n] — shows blue when there are notes or collected
      const sMarker = document.createElement('sup');
      sMarker.className = 'sent-marker';
      const hasNotes = (sentenceNotes[sentId] && sentenceNotes[sentId].trim()) || sentenceData.some(s => s.sentId === sentId);
      if (hasNotes) sMarker.classList.add('has-notes');
      sMarker.textContent = `[${sentCount}]`;
      sMarker.dataset.sentId = sentId;
      sMarker.onclick = () => { lastSentText = sentText; selectedSentId = sentId; toggleSentenceCard(sentId, sentText, sMarker); };
      pEl.appendChild(sMarker);
      pEl.appendChild(document.createTextNode(' '));
    });
    container.appendChild(pEl);
  });
}

// ============================================================
// INLINE SENTENCE CARD
// ============================================================
let openCardSentId = null;

function toggleSentenceCard(sentId, sentText, markerEl) {
  // If clicking the same marker, close the card
  if (openCardSentId === sentId) {
    closeSentenceCard();
    return;
  }
  // Close existing card
  closeSentenceCard();

  // Create new card
  const card = document.createElement('div');
  card.className = 'sentence-card';
  card.id = 'sentenceCard';

  // Render sentence with clickable words
  const parts = sentText.split(/(\s+)/);
  let wordIdx = 0;
  const cardWordsHtml = parts.map(part => {
    if (part.trim() === '') return part;
    const clean = part.replace(/[^a-zA-Z]/g,'').toLowerCase();
    if (!clean.length) return escHtml(part);
    const vm = vocabData.find(v => v.wordLower === clean && v.sentenceId === sentId);
    const sm = syntaxData.filter(s => s.sentId === sentId && s.wordIndices.includes(wordIdx));
    const level = vm ? vm.level : '';
    const synType = sm.length ? sm[0].type : '';
    const idx = wordIdx;
    wordIdx++;
    let cls = 'word-clickable';
    if (level) cls += ' vocab-' + level;
    let synPre = '', synPost = '';
    if (synType) { synPre = `<span class="syn-group syn-${synType}">`; synPost = '</span>'; }
    return `${synPre}<span class="${cls}" data-w="${idx}" data-clean="${clean}" data-sent-id="${sentId}" data-word="${escHtml(part)}" onclick="event.stopPropagation();handleWordClick(this,'${sentId}','${escHtml(sentText).replace(/'/g,"\\'")}','${clean}','${escHtml(part).replace(/'/g,"\\'")}',event)">${escHtml(part)}</span>${synPost}`;
  }).join('');

  const isCollected = sentenceData.some(s => s.sentId === sentId);
  const savedNote = sentenceNotes[sentId] || '';

  card.innerHTML = `
    <div class="card-sentence">${cardWordsHtml}</div>
    <div class="card-label">我的理解</div>
    <textarea class="card-notes" id="cardNoteInput" placeholder="写下你对这句话的理解、翻译..." oninput="saveCardNote('${sentId}')">${escHtml(savedNote)}</textarea>
    <span class="card-saved-hint" id="cardSavedHint">已保存</span>
    <div class="card-actions">
      <button class="${isCollected?'collected':''}" onclick="collectSentence('${sentId}')">${isCollected?'★ Collected':'☆ 收藏句式'}</button>
    </div>
  `;

  // Insert after the marker
  markerEl.parentNode.insertBefore(card, markerEl.nextSibling);
  openCardSentId = sentId;
}

function closeSentenceCard() {
  const card = document.getElementById('sentenceCard');
  if (card) card.remove();
  openCardSentId = null;
}

function saveCardNote(sentId) {
  const val = document.getElementById('cardNoteInput').value;
  sentenceNotes[sentId] = val;
  saveNotes();
  const hint = document.getElementById('cardSavedHint');
  hint.classList.add('show');
  clearTimeout(window._noteTimer);
  window._noteTimer = setTimeout(() => hint.classList.remove('show'), 2000);
  // Update marker state
  const hasNotes = val.trim() || sentenceData.some(s => s.sentId === sentId);
  const marker = document.querySelector(`.sent-marker[data-sent-id="${sentId}"]`);
  if (marker) {
    if (hasNotes) marker.classList.add('has-notes');
    else marker.classList.remove('has-notes');
  }
}

// ============================================================
// WORD CLICK & POPUP
// ============================================================
function clearRangeHighlight() {
  document.querySelectorAll('.word-clickable.range-start, .word-clickable.range-selected').forEach(el => {
    el.classList.remove('range-start', 'range-selected');
  });
}

function showUnifiedPopup(el, sentId, clean, origWord, sentText) {
  const wordIdx = parseInt(el.dataset.w);
  const existingVocab = vocabData.find(v => v.wordLower === clean && v.sentenceId === sentId);
  const wordSyntax = syntaxData.filter(s => s.sentId === sentId && s.wordIndices.includes(wordIdx));

  currentSyntaxSelection = { sentId, indices: [wordIdx], wordSpans: [el] };
  currentWord = { word: clean, displayWord: origWord.replace(/[^a-zA-Z]/g,''), sentId, sentText };
  multiWordMode = false;
  multiWordStart = null;
  clearRangeHighlight();
  el.classList.add('range-start');

  const popup = document.getElementById('vocabPopup');
  const rect = el.getBoundingClientRect();
  let left = rect.left + rect.width/2 - 160, top = rect.bottom + 4;
  if (left < 10) left = 10;
  if (left + 320 > window.innerWidth - 10) left = window.innerWidth - 330;
  if (top + 160 > window.innerHeight) top = rect.top - 160;
  popup.style.left = left + 'px'; popup.style.top = top + 'px'; popup.style.display = 'block';

  // Render vocab row (DOM — no innerHTML hack)
  const vocabRow = document.getElementById('vocabColors');
  vocabRow.innerHTML = '<span class="popup-label">生词</span>';
  ['red','yellow'].forEach(lvl => {
    const btn = document.createElement('div');
    btn.className = 'color-btn ' + lvl;
    if (existingVocab && existingVocab.level === lvl) btn.classList.add('active');
    btn.title = lvl;
    btn.onclick = function() { markWord(lvl); };
    vocabRow.appendChild(btn);
  });

  // Render hint row (separate sibling div — proper DOM)
  const hintRow = document.getElementById('vocabHintRow');
  if (existingVocab) {
    hintRow.innerHTML = '<span class="popup-label">提示</span>';
    const inp = document.createElement('textarea');
    inp.className = 'hint-input';
    inp.id = 'hintInput';
    inp.rows = 1;
    inp.value = existingVocab.hint || '';
    inp.placeholder = '中文记忆线索...';
    inp.oninput = function() { this.style.height = 'auto'; this.style.height = this.scrollHeight + 'px'; saveVocabHint(); };
    hintRow.appendChild(inp);
    hintRow.style.display = '';
  } else {
    hintRow.innerHTML = '';
    hintRow.style.display = 'none';
  }

  // Render syntax row — only for unmarked words
  const synRow = document.getElementById('vocabSynRow');
  if (!existingVocab) {
    let shtml = '<span class="popup-label">语法</span>';
    SYNTAX_TYPES.forEach(t => {
      shtml += `<button class="syn-btn syn-${t.id}${wordSyntax.some(s => s.type === t.id) ? ' active' : ''}" onclick="applySyntaxFromPopup('${t.id}')" title="${t.name}">${t.label}</button>`;
    });
    shtml += `<button class="multi-toggle" id="multiToggle" onclick="toggleMultiWord()">多词模式</button>`;
    synRow.innerHTML = shtml;
    synRow.style.display = '';
  } else {
    synRow.innerHTML = '';
    synRow.style.display = 'none';
  }
}

function handleWordClick(el, sentId, sentText, clean, origWord, event) {
  // Multi-word mode: second click selects range
  if (multiWordMode && multiWordStart && multiWordStart.sentId === sentId) {
    event.preventDefault();
    const startIdx = multiWordStart.wordIdx;
    const endIdx = parseInt(el.dataset.w);
    const from = Math.min(startIdx, endIdx);
    const to = Math.max(startIdx, endIdx);

    const sentSpan = el.closest('.sentence');
    if (!sentSpan) return;
    const allWords = sentSpan.querySelectorAll('.word-clickable');
    const wordSpans = [];
    const indices = [];
    clearRangeHighlight();
    allWords.forEach(ws => {
      const w = parseInt(ws.dataset.w);
      if (w >= from && w <= to) {
        wordSpans.push(ws);
        indices.push(w);
        ws.classList.add('range-selected');
      }
    });

    if (wordSpans.length >= 2) {
      currentSyntaxSelection = { sentId, indices: indices.sort((a,b)=>a-b), wordSpans };
      // Check if this range is already marked as a phrase
      const phraseEntry = vocabData.find(v => v.wordIndices && v.wordIndices.length > 1 && v.sentenceId === sentId && v.wordIndices.length === indices.length && v.wordIndices.every(i => indices.includes(i)));
      // Update vocab row for phrase marking (DOM)
      const vocabRow = document.getElementById('vocabColors');
      vocabRow.innerHTML = '<span class="popup-label">短语</span>';
      ['red','yellow'].forEach(lvl => {
        const btn = document.createElement('div');
        btn.className = 'color-btn ' + lvl;
        if (phraseEntry && phraseEntry.level === lvl) btn.classList.add('active');
        btn.title = lvl;
        btn.onclick = function() { markWord(lvl); };
        vocabRow.appendChild(btn);
      });
      // Hint row (proper DOM)
      const hintRow = document.getElementById('vocabHintRow');
      if (phraseEntry) {
        hintRow.innerHTML = '<span class="popup-label">提示</span>';
        const inp = document.createElement('textarea');
        inp.className = 'hint-input';
        inp.id = 'hintInput';
        inp.rows = 1;
        inp.value = phraseEntry.hint || '';
        inp.placeholder = '中文记忆线索...';
        inp.oninput = function() { this.style.height = 'auto'; this.style.height = this.scrollHeight + 'px'; saveVocabHint(); };
        hintRow.appendChild(inp);
        hintRow.style.display = '';
      } else {
        hintRow.innerHTML = '';
        hintRow.style.display = 'none';
      }
      // Update syntax row
      const synRow = document.getElementById('vocabSynRow');
      synRow.style.display = '';
      let shtml = '<span class="popup-label">语法(' + indices.length + '词)</span>';
      SYNTAX_TYPES.forEach(t => {
        const existing = syntaxData.filter(s => s.sentId === sentId);
        const active = existing.some(s => s.type === t.id && s.wordIndices.some(i => indices.includes(i)));
        shtml += `<button class="syn-btn syn-${t.id}${active ? ' active' : ''}" onclick="applySyntaxFromPopup('${t.id}')" title="${t.name}">${t.label}</button>`;
      });
      shtml += `<button class="multi-toggle on" id="multiToggle" onclick="toggleMultiWord()">多词模式</button>`;
      synRow.innerHTML = shtml;
    }
    return;
  }

  showUnifiedPopup(el, sentId, clean, origWord, sentText);
}

function toggleMultiWord() {
  multiWordMode = !multiWordMode;
  const btn = document.getElementById('multiToggle');
  if (multiWordMode) {
    btn.textContent = '点击第二个词...';
    btn.classList.add('on');
    multiWordStart = {
      el: document.querySelector('.word-clickable.range-start'),
      sentId: currentWord.sentId,
      wordIdx: parseInt(document.querySelector('.word-clickable.range-start')?.dataset?.w || 0)
    };
  } else {
    btn.textContent = '多词模式';
    btn.classList.remove('on');
    multiWordStart = null;
    clearRangeHighlight();
    const el = document.querySelector(`.word-clickable[data-sent-id="${currentWord?.sentId}"][data-w="${currentSyntaxSelection?.indices?.[0]}"]`);
    if (el) el.classList.add('range-start');
    if (currentSyntaxSelection) {
      currentSyntaxSelection = { sentId: currentWord.sentId, indices: [currentSyntaxSelection.indices[0]], wordSpans: [el] };
    }
  }
}

function saveVocabHint() {
  const hint = document.getElementById('hintInput')?.value || '';
  if (currentSyntaxSelection && currentSyntaxSelection.indices.length >= 2) {
    const { sentId, indices } = currentSyntaxSelection;
    const entry = vocabData.find(v => v.wordIndices && v.wordIndices.length === indices.length && v.sentenceId === sentId && v.wordIndices.every(i => indices.includes(i)));
    if (entry) { entry.hint = hint; saveVocab(); renderVocab(); }
  } else if (currentWord) {
    const { word, sentId } = currentWord;
    const entry = vocabData.find(v => !v.wordIndices && v.wordLower === word && v.sentenceId === sentId);
    if (entry) { entry.hint = hint; saveVocab(); renderVocab(); }
  }
}

function markWord(level) {
  // Handle phrase marking (multi-word selection)
  if (currentSyntaxSelection && currentSyntaxSelection.indices.length >= 2) {
    const { sentId, indices, wordSpans } = currentSyntaxSelection;
    const phraseText = wordSpans.map(s => s.dataset.word).join(' ');
    const phraseLower = indices.map(i => wordSpans.find(s => parseInt(s.dataset.w) === i)?.dataset.clean || '').join(' ');
    const sentText = wordSpans[0]?.closest('.sentence')?.textContent || '';
    const existing = vocabData.find(v => v.wordIndices && v.wordIndices.length === indices.length && v.sentenceId === sentId && v.wordIndices.every(i => indices.includes(i)));
    vocabData = vocabData.filter(v => !(v.wordIndices && v.wordIndices.length === indices.length && v.sentenceId === sentId && v.wordIndices.every(i => indices.includes(i))));
    if (existing && existing.level === level) {
      saveVocab(); closePopup(); renderArticle(); renderVocab();
      if (openCardSentId) { const marker = document.querySelector(`.sent-marker[data-sent-id="${openCardSentId}"]`); if (marker) { const sid = openCardSentId; closeSentenceCard(); toggleSentenceCard(sid, lastSentText, marker); } }
      return;
    }
    const prevHint = existing ? existing.hint || '' : '';
    vocabData.push({ word: phraseText, wordLower: phraseLower, wordIndices: indices, level, hint: prevHint, sentenceId: sentId, sentText: sentText.substring(0,100), date: todayStr(), stage: 0, reviewedDate: todayStr() });
    saveVocab(); closePopup(); renderArticle(); renderVocab();
    if (openCardSentId) { const marker = document.querySelector(`.sent-marker[data-sent-id="${openCardSentId}"]`); if (marker) { const sid = openCardSentId; closeSentenceCard(); toggleSentenceCard(sid, lastSentText || sentText, marker); } }
    return;
  }

  // Single-word marking
  if (!currentWord) return;
  const { word, displayWord, sentId, sentText } = currentWord;
  const existing = vocabData.find(v => !v.wordIndices && v.wordLower === word && v.sentenceId === sentId);
  vocabData = vocabData.filter(v => !(v.wordIndices === undefined && v.wordLower === word && v.sentenceId === sentId));
  if (existing && existing.level === level) {
    saveVocab(); closePopup(); renderArticle(); renderVocab();
    if (openCardSentId) {
      const marker = document.querySelector(`.sent-marker[data-sent-id="${openCardSentId}"]`);
      if (marker) { const sid = openCardSentId; closeSentenceCard(); toggleSentenceCard(sid, lastSentText || sentText, marker); }
    }
    return;
  }
  if (level !== 'remove') {
    const prevHint = existing ? existing.hint || '' : '';
    vocabData.push({ word: displayWord, wordLower: word, level, hint: prevHint, sentenceId: sentId, sentText: sentText.substring(0,100), date: todayStr(), stage: 0, reviewedDate: todayStr() });
  }
  saveVocab(); closePopup(); renderArticle(); renderVocab();
  // Refresh card if open
  if (openCardSentId) {
    const marker = document.querySelector(`.sent-marker[data-sent-id="${openCardSentId}"]`);
    if (marker) { const sid = openCardSentId; closeSentenceCard(); toggleSentenceCard(sid, lastSentText || sentText, marker); }
  }
}

function applySyntaxFromPopup(typeId) {
  if (!currentSyntaxSelection) return;
  const { sentId, indices } = currentSyntaxSelection;
  const idxSet = new Set(indices);

  const existing = syntaxData.filter(s => s.sentId === sentId && s.type === typeId);
  const allMatch = existing.some(s => s.wordIndices.length === indices.length && s.wordIndices.every(i => idxSet.has(i)));
  if (allMatch) {
    syntaxData = syntaxData.filter(s => !(s.sentId === sentId && s.type === typeId && s.wordIndices.length === indices.length && s.wordIndices.every(i => idxSet.has(i))));
  } else {
    syntaxData = syntaxData.filter(s => {
      if (s.sentId !== sentId) return true;
      return !s.wordIndices.some(i => idxSet.has(i));
    });
    syntaxData.push({ sentId, wordIndices: indices, type: typeId });
  }
  saveSyntax(); closePopup(); multiWordMode = false; multiWordStart = null;
  clearRangeHighlight(); renderArticle();
  // Refresh card if open
  if (openCardSentId) {
    const marker = document.querySelector(`.sent-marker[data-sent-id="${openCardSentId}"]`);
    if (marker) { const sid = openCardSentId; closeSentenceCard(); toggleSentenceCard(sid, lastSentText, marker); }
  }
}

let vocabFilter = 'all';
let vocabSort = 'difficulty';

function setVocabSort(mode) {
  vocabSort = mode;
  document.querySelectorAll('.vocab-sort-bar button').forEach(b => b.classList.remove('active'));
  document.querySelector(`.vocab-sort-bar button[data-sort="${mode}"]`).classList.add('active');
  renderVocab();

function toggleSuspend(wordLower) {
  vocabData.forEach(v => {
    if (v.wordLower === wordLower) v.suspended = !v.suspended;
  });
  saveVocab();
  renderVocab();
}

function isSuspended(wordLower) {
  return vocabData.some(v => v.wordLower === wordLower && v.suspended);
}

function groupPos(wl) {
  // Find earliest article position for a word group
  let minPara = 999, minSent = 999, minWord = 999;
  vocabData.forEach(v => {
    if (v.wordLower !== wl) return;
    const m = v.sentenceId && v.sentenceId.match(/p(\d+)-s(\d+)/);
    if (!m) return;
    const p = parseInt(m[1]), s = parseInt(m[2]), w = v.wordIndices ? v.wordIndices[0] : 0;
    if (p < minPara || (p === minPara && s < minSent) || (p === minPara && s === minSent && w < minWord)) {
      minPara = p; minSent = s; minWord = w;
    }
  });
  return { para: minPara, sent: minSent, word: minWord };
}

function renderVocab() {
  const list = document.getElementById('vocab-list');
  let filtered = vocabFilter === 'all' ? vocabData : vocabData.filter(v => v.level === vocabFilter);
  const grouped = {};
  filtered.forEach(v => { const k = v.wordLower; if (!grouped[k]) grouped[k] = []; grouped[k].push(v); });
  const entries = Object.entries(grouped);
  if (!entries.length) { list.innerHTML = '<div class="vocab-empty">No vocabulary marked yet.</div>'; return; }

  let sorted;
  if (vocabSort === 'order') {
    sorted = entries.sort((a, b) => {
      const pa = groupPos(a[0]), pb = groupPos(b[0]);
      return pa.para - pb.para || pa.sent - pb.sent || pa.word - pb.word;
    });
  } else {
    // difficulty: min stage asc, then red before yellow
    sorted = entries.sort((a, b) => {
      const sa = Math.min(...a[1].map(v => ensureStage(v).stage));
      const sb = Math.min(...b[1].map(v => ensureStage(v).stage));
      if (sa !== sb) return sa - sb;
      const la = Math.min(...a[1].map(v => ({red:0,yellow:1})[v.level] ?? 1));
      const lb = Math.min(...b[1].map(v => ({red:0,yellow:1})[v.level] ?? 1));
      return la - lb;
    });
  }

  list.innerHTML = sorted.map(([wl,entries]) => {
    const e = entries[0];
    const label = {red:'🔴',yellow:'🟡'}[e.level];
    const hint = e.hint ? ` <span style="color:#888;font-size:12px;">${escHtml(e.hint)}</span>` : '';
    const ctx = [...new Set(entries.map(x=>x.sentText))].slice(0,1)[0]||'';
    const stage = Math.min(...entries.map(v => ensureStage(v).stage));
    const suspended = isSuspended(wl);
    const suspendLabel = suspended ? '恢复' : '停止';
    const suspendCls = suspended ? 'restore' : '';
    return `<div class="vocab-list-item${suspended ? ' suspended' : ''}" onclick="scrollToSent('${e.sentenceId}')">
      <span class="level-dot ${e.level}"></span>
      <span class="vocab-stage s${stage}">S${stage}</span>
      <span class="word">${label} ${e.word}${hint}</span>
      <span class="context">${escHtml(ctx)}</span>
      <span class="vocab-actions">
        <span class="vocab-suspend-btn ${suspendCls}" onclick="event.stopPropagation();toggleSuspend('${wl}')">${suspendLabel}</span>
      </span>
    </div>`;
  }).join('');
}

function scrollToSent(sentId) {
  const el = document.querySelector(`[data-sent-id="${sentId}"]`);
  if (el) { el.scrollIntoView({behavior:'smooth',block:'center'}); el.classList.add('highlight'); setTimeout(()=>el.classList.remove('highlight'),2000); }
}

function exportObsidian() {
  if (!articleData) { alert('No article loaded.'); return; }
  const date = todayStr();
  const slug = slugify(articleData.title);
  const noteFileName = date + '-' + slug;

  let md = '# '+date+' 精读笔记\n\n- **文章**：'+articleData.title+'\n- **来源**：'+(articleData.source||'—')+'\n- **日期**：'+date+'\n\n---\n\n';

  // ── Annotated article (pure markdown, no HTML) ──
  md += '## 原文\n\n';
  let sentCount = 0;
  articleData.paragraphs.forEach((sents, pIdx) => {
    const paraNum = pIdx + 1;
    let paraText = '';
    sents.forEach((sentText) => {
      sentCount++;
      const sentId = 'p' + paraNum + '-s' + sentCount;
      const parts = sentText.split(/(\s+)/);
      let wordIdx = 0;
      parts.forEach(part => {
        if (part.trim() === '') { paraText += part; return; }
        const clean = part.replace(/[^a-zA-Z]/g, '').toLowerCase();
        if (!clean.length) { paraText += part; return; }
        const pm = vocabData.find(v => v.wordIndices && v.wordIndices.length > 1 && v.sentenceId === sentId && v.wordIndices.includes(wordIdx));
        const vm = vocabData.find(v => !v.wordIndices && v.wordLower === clean && v.sentenceId === sentId);
        const entry = pm || vm;
        if (entry) {
          if (entry.level === 'red') {
            paraText += '<mark style="background:#fca5a5">' + part + '</mark>';
          } else {
            paraText += '==' + part + '==';
          }
        } else {
          paraText += part;
        }
        wordIdx++;
      });
      const hasNote = sentenceNotes[sentId] && sentenceNotes[sentId].trim();
      const hasCollected = sentenceData.some(s => s.sentId === sentId);
      if (hasNote || hasCollected) paraText += ' [*]';
    });
    md += paraText + '\n\n';
  });

  // ── Sentence notes ──
  const noteEntries = Object.entries(sentenceNotes).filter(([,v]) => v.trim());
  if (noteEntries.length) {
    md += '## 句子理解\n\n';
    noteEntries.forEach(([sentId, note]) => {
      md += '- \[' + sentId.split('-s')[1] + '\] ' + escMd(note) + '\n';
    });
    md += '\n';
  }

  // ── Vocab table ──
  if (vocabData.length) {
    md += '## 生词\n\n| 级别 | 单词 | 提示 |\n|------|------|------|\n';
    const seen = new Set();
    vocabData.forEach(v => {
      const k = v.wordLower + '|' + v.sentenceId;
      if (seen.has(k)) return; seen.add(k);
      md += '| ' + ({red:'🔴',yellow:'🟡'}[v.level]||'') + ' | **' + escMd(v.word) + '** | ' + (v.hint||'') + ' |\n';
    });
    md += '\n';
  }

  // ── Sentence collection ──
  if (sentenceData.length) {
    md += '## 句式收集\n\n| 原文 | 仿写 | 改写 | 标签 |\n|------|------|------|------|\n';
    sentenceData.forEach(s => {
      md += '| ' + escMd(s.sentText) + ' | ' + escMd(s.imitation||'') + ' | ' + escMd(s.paraphrase||'') + ' | ' + (s.tags||[]).join(', ') + ' |\n';
    });
    md += '\n';
  }

  downloadFile(noteFileName + '.md', md);
  alert('已下载: ' + noteFileName + '.md');
}

function importJson(event) {

  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if (data.vocab) { const seen = new Map(vocabData.map(v=>[v.wordLower+'-'+v.sentenceId, v])); data.vocab.forEach(v=>{const k=(v.wordLower||v.word.toLowerCase())+'-'+v.sentenceId; if(!seen.has(k)) seen.set(k,v);}); vocabData = Array.from(seen.values()); saveVocab(); }
      if (data.sentences) { const seen = new Map(sentenceData.map(s=>[s.sentId, s])); data.sentences.forEach(s=>{if(!seen.has(s.sentId)) seen.set(s.sentId, s);}); sentenceData = Array.from(seen.values()); saveSentences(); }
      if (data.syntax) { syntaxData = data.syntax; saveSyntax(); }
      if (data.sentenceNotes) { sentenceNotes = data.sentenceNotes; saveNotes(); }
      renderAll(); renderVocab(); renderSentences();
      alert('Imported!');

function importSnapshot(event) {

      const data = JSON.parse(decodeURIComponent(m[1]));

let panelCollapsed = false;

/* ── GitHub Sync ── */
const SYNC_OWNER = '285-code';
const SYNC_REPO = 'ielts-read';
const SYNC_PATH = 'data/sync.json';
const SYNC_BRANCH = 'main';

function getGithubToken() { return localStorage.getItem('ielts_github_token') || ''; }
function saveGithubToken() {
  const t = document.getElementById('githubTokenInput').value.trim();
  localStorage.setItem('ielts_github_token', t);
  setSyncStatus('token saved', 'ok');
}
function loadGithubToken() {
  const t = getGithubToken();
  const el = document.getElementById('githubTokenInput');
  if (el) el.value = t;
}

function setSyncStatus(msg, cls) {
  const el = document.getElementById('syncStatus');
  if (el) { el.textContent = msg; el.className = 'status' + (cls ? ' ' + cls : ''); }
}

function toggleSyncPanel() {

  el.classList.toggle('open');
  loadGithubToken();
  const cb = document.getElementById('autoSyncCheck');
  if (cb) cb.checked = localStorage.getItem('ielts_auto_sync') === '1';
}

function collectAllData() {
  const index = JSON.parse(localStorage.getItem('ielts_index') || '{}');
  const articles = {};
  Object.keys(index).forEach(function(id) {
    const raw = localStorage.getItem('ielts_article_' + id);
    if (raw) articles[id] = JSON.parse(raw);
  });
  return { index: index, articles: articles, lastArticle: localStorage.getItem('ielts_last_article') || '' };
}

function pushToGithub(retries) {
  if (retries === undefined) retries = 3;
  const token = getGithubToken();
  if (!token) { setSyncStatus('set token first', 'err'); return; }
  setSyncStatus('pushing...', 'busy');

  const data = JSON.stringify(collectAllData());
  const content = btoa(unescape(encodeURIComponent(data)));

  // First get the current file SHA (if exists)
  fetch('https://api.github.com/repos/' + SYNC_OWNER + '/' + SYNC_REPO + '/contents/' + SYNC_PATH + '?ref=' + SYNC_BRANCH, {
    headers: { 'Authorization': 'Bearer ' + token, 'Accept': 'application/vnd.github.v3+json' }
  })
  .then(function(r) {
    if (r.status === 404) return null;
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.json();
  })
  .then(function(existing) {
    var body = { message: 'sync: ' + new Date().toISOString().slice(0,16), content: content, branch: SYNC_BRANCH };
    if (existing && existing.sha) body.sha = existing.sha;
    return fetch('https://api.github.com/repos/' + SYNC_OWNER + '/' + SYNC_REPO + '/contents/' + SYNC_PATH, {
      method: 'PUT',
      headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json', 'Accept': 'application/vnd.github.v3+json' },
      body: JSON.stringify(body)
    });
  })
  .then(function(r) {
    if (r.status === 409 && retries > 0) {
      // SHA conflict — retry with fresh SHA
      return pushToGithub(retries - 1);
    }
    if (!r.ok) throw new Error('HTTP ' + r.status);
    setSyncStatus('synced ' + new Date().toLocaleTimeString(), 'ok');
  })
  .catch(function(e) {
    setSyncStatus('push failed: ' + e.message, 'err');
  });
}

function pullFromGithub() {
  setSyncStatus('pulling...', 'busy');
  var token = getGithubToken();
  var url = token
    ? 'https://api.github.com/repos/' + SYNC_OWNER + '/' + SYNC_REPO + '/contents/' + SYNC_PATH
    : 'https://raw.githubusercontent.com/' + SYNC_OWNER + '/' + SYNC_REPO + '/' + SYNC_BRANCH + '/' + SYNC_PATH;
  var opts = { headers: {} };
  if (token) opts.headers['Authorization'] = 'Bearer ' + token;
  fetch(url, opts)
  .then(function(r) {
    if (r.status === 404) { setSyncStatus('no sync data yet — push from your other device first', 'err'); return null; }
    if (!r.ok) throw new Error('HTTP ' + r.status);
    if (token) {
      // API returns base64-encoded content
      return r.json().then(function(j) {
        if (!j || !j.content) throw new Error('invalid response');
        return JSON.parse(decodeURIComponent(escape(atob(j.content.replace(/\s/g,'')))));
      });
    } else {
      return r.json();
    }
  })
  .then(function(data) {
    if (!data || !data.index) { throw new Error('invalid sync data'); }
    mergeSyncData(data);
    setSyncStatus('pulled ' + new Date().toLocaleTimeString(), 'ok');
    location.reload();
  })
  .catch(function(e) {
    setSyncStatus('pull failed: ' + e.message, 'err');
  });
}

function mergeSyncData(data) {
  // Merge index
  var index = JSON.parse(localStorage.getItem('ielts_index') || '{}');
  Object.keys(data.index).forEach(function(id) {
    index[id] = data.index[id];
  });
  localStorage.setItem('ielts_index', JSON.stringify(index));
  // Merge articles
  Object.keys(data.articles).forEach(function(id) {
    var key = 'ielts_article_' + id;
    localStorage.setItem(key, JSON.stringify(data.articles[id]));
  });
  if (data.lastArticle) {
    localStorage.setItem('ielts_last_article', data.lastArticle);
  }
}

function todayStr() { return new Date().toISOString().split('T')[0]; }
function escHtml(s) { const d = document.createElement('div'); d.textContent=s||''; return d.innerHTML; }
function escMd(s) { if (!s) return ''; return s.replace(/\|/g,'\\|').replace(/\n/g,' '); }
function slugify(s) { return s.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'').substring(0,40); }
function downloadFile(name, content) {
  const blob = new Blob([content], {type:'text/markdown;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download=name; a.click();
  URL.revokeObjectURL(url);
}

// ============================================================
// SRS REVIEW SYSTEM
// ============================================================
const SRS_INTERVALS = [0, 1, 2, 4, 7, 14];

function ensureStage(entry) {
  if (entry.stage === undefined) entry.stage = 0;
  if (!entry.reviewedDate) entry.reviewedDate = entry.date || todayStr();
  return entry;
}

function getReviewQueue() {
  const today = todayStr();
  const seen = new Set();
  const queue = [];
  vocabData.forEach(v => {
    ensureStage(v);
    const k = v.wordLower + '|' + v.sentenceId;
    if (seen.has(k)) return;
    seen.add(k);
    if (!v.word || v.suspended) return;
    const daysSince = daysBetween(v.reviewedDate, today);
    if (daysSince >= SRS_INTERVALS[v.stage]) {
      queue.push(v);
    }
  });
  for (let i = queue.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [queue[i], queue[j]] = [queue[j], queue[i]];
  }
  return queue;
}

function daysBetween(d1, d2) {
  const a = new Date(d1 + 'T00:00:00');
  const b = new Date(d2 + 'T00:00:00');
  return Math.round((b - a) / 86400000);
}

function updateStage(entry, correct) {
  ensureStage(entry);
  entry.stage = correct ? Math.min(5, entry.stage + 1) : Math.max(0, entry.stage - 1);
  entry.reviewedDate = todayStr();
  saveVocab();
}

function getSentTextById(sentId) {
  if (!articleData) return '';
  const m = sentId.match(/p(\d+)-s(\d+)/);
  if (!m) return '';
  const globalIdx = parseInt(m[2]);
  let count = 0;
  for (const para of articleData.paragraphs) {
    for (const sent of para) {
      count++;
      if (count === globalIdx) return sent;
    }
  }
  return '';
}

function makeCloze(sentText, entry) {
  const word = entry.word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  if (entry.wordIndices && entry.wordIndices.length > 1) {
    const blanks = '______ '.repeat(entry.wordIndices.length).trim();
    return sentText.replace(new RegExp(word.replace(/\s+/g, '\\s+'), 'gi'), blanks);
  }
  return sentText.replace(new RegExp('\\b' + word + '\\b', 'gi'), '______');
}

// Review state
let reviewQueue = [];
let reviewIndex = 0;
let reviewStats = { correct: 0, incorrect: 0 };
let reviewExpanded = false;
let reviewRetry = false;
let reviewRequeue = new Set(); // words that need re-review in this session

function startReview() {
  reviewQueue = getReviewQueue();
  reviewIndex = 0;
  reviewStats = { correct: 0, incorrect: 0 };
  reviewRetry = false;
  reviewRequeue = new Set();
  showReviewCard();
}

function showReviewCard() {
  const card = document.getElementById('reviewCard');
  const progressEl = document.getElementById('reviewProgress');
  const labelEl = document.getElementById('reviewLabel');
  const barFill = document.getElementById('reviewBarFill');

  // Remove any existing overlay first
  const oldOverlay = document.getElementById('reviewOverlay');
  if (oldOverlay) {
    const inner = oldOverlay.firstElementChild;
    if (inner && inner.parentNode) inner.remove();
    oldOverlay.remove();
  }

  if (reviewIndex >= reviewQueue.length) {
    if (reviewRequeue.size > 0) {
      var newQ = [];
      var seen = new Set();
      vocabData.forEach(function(v) {
        if (reviewRequeue.has(v.wordLower) && !v.suspended) {
          var k = v.wordLower + '|' + v.sentenceId;
          if (!seen.has(k)) { seen.add(k); newQ.push(Object.assign({}, v)); }
        }
      });
      if (newQ.length > 0) {
        for (var i = newQ.length - 1; i > 0; i--) {
          var j = Math.floor(Math.random() * (i + 1));
          var tmp = newQ[i]; newQ[i] = newQ[j]; newQ[j] = tmp;
        }
        reviewQueue = newQ;
        reviewIndex = 0;
        showReviewCard();
        return;
      }
    }
    const total = reviewStats.correct + reviewStats.incorrect;
    labelEl.textContent = `Done! ${reviewStats.correct}/${total}`;
    barFill.style.width = '100%';
    card.innerHTML = '<div class="review-empty">🎉 All words reviewed for today!</div>';
    if (reviewExpanded) toggleReviewSize();
    return;
  }

  const entry = reviewQueue[reviewIndex];
  const fullSent = getSentTextById(entry.sentenceId) || entry.sentText || '';
  const clozeSent = fullSent ? makeCloze(fullSent, entry) : '______';
  const total = reviewQueue.length;
  const done = reviewStats.correct + reviewStats.incorrect;

  labelEl.textContent = `${reviewIndex + 1} / ${total}  ✓${reviewStats.correct} ✗${reviewStats.incorrect}`;
  barFill.style.width = (done / total * 100) + '%';

  const sizeLabel = reviewExpanded ? '缩小' : '放大';
  const sizeBtn = '<button class="review-size-btn" id="reviewSizeBtn" onclick="toggleReviewSize()">' + sizeLabel + '</button>';

  // Build letter boxes
  var isPhrase = entry.word.indexOf(' ') !== -1;
  var boxesHtml = '';
  if (isPhrase) {
    // Multi-word phrase: use regular input with pattern placeholder
    var pattern = entry.word[0] + '_'.repeat(Math.max(0, entry.word.length - 1));
    boxesHtml = '<input type="text" id="reviewAnswer" class="review-input" placeholder="' + pattern + '" autocomplete="off" spellcheck="false" onkeydown="if(event.key===\'Enter\'){event.stopPropagation();checkAnswer()}">';
  } else {
    // Single word: letter boxes
    boxesHtml = '<div id="letterBoxContainer" class="letter-box-container">' +
      '  <div id="letterBoxes" class="letter-boxes">';
    for (var i = 0; i < entry.word.length; i++) {
      boxesHtml += '<span class="lbox" data-idx="' + i + '">_</span>';
    }
    boxesHtml += '  </div>' +
      '  <input type="text" id="reviewAnswer" class="letter-box-input" autocomplete="off" spellcheck="false" maxlength="' + entry.word.length + '"' +
      '    onkeydown="if(event.key===\'Enter\'){event.stopPropagation();checkAnswer()}else if(event.key===\'Backspace\'){setTimeout(syncLetterBoxes,0)}"' +
      '    oninput="syncLetterBoxes()">' +
      '</div>';
  }

  // Hint below input: Chinese meaning + English def (no letter pattern)
  var hintHtml = '<div class="review-hint-inline">';
  if (entry.hint) hintHtml += '<div class="hint-chinese">💡 ' + escHtml(entry.hint) + '</div>';
  hintHtml += '<div class="hint-def" id="reviewHintDef">📖 Loading definition...</div></div>';

  card.innerHTML =
    '<div class="review-card">' +
    '  <div style="display:flex;justify-content:space-between;margin-bottom:6px;">' +
    '    <button class="review-skip-btn" onclick="skipReviewWord()">不再复习</button>' +
    '    ' + sizeBtn +
    '  </div>' +
    '  <div class="review-sentence">' + escHtml(clozeSent) + '</div>' +
    '  <div class="review-input-row">' +
    '    ' + boxesHtml +
    '    <button class="btn-primary" onclick="checkAnswer()">Check</button>' +
    '  </div>' +
    // Hint below input row
    hintHtml +
    '  <div id="reviewFeedback" class="review-feedback"></div>' +
    '</div>';

  // Wrap in overlay if expanded
  if (reviewExpanded) {
    const cardEl = card.firstElementChild;
    if (cardEl) {
      const overlay = document.createElement('div');
      overlay.className = 'review-overlay';
      overlay.id = 'reviewOverlay';
      overlay.onclick = function(e) { if (e.target === this) toggleReviewSize(); };
      document.body.appendChild(overlay);
      overlay.appendChild(cardEl);
    }
  }

  // Keyboard shortcuts: Enter→next (when answered), Space→pronounce

  // Auto-fetch English definition
  fetchPhonetic(entry.word, function(ph) {
    var defEl = document.getElementById('reviewHintDef');
    if (defEl) defEl.textContent = ph ? '📖 ' + entry.word + '  ' + ph : '';
  });
  // Also try dictionary API for definition
  if (entry.word) {
    fetch('https://api.dictionaryapi.dev/api/v2/entries/en/' + encodeURIComponent(entry.word))
      .then(function(r){ return r.ok ? r.json() : Promise.reject(); })
      .then(function(data) {
        var defEl = document.getElementById('reviewHintDef');
        if (!defEl) return;
        if (data && data[0] && data[0].meanings) {
          var defs = [];
          data[0].meanings.slice(0, 2).forEach(function(m) {
            if (m.definitions && m.definitions[0]) {
              defs.push('[' + m.partOfSpeech + '] ' + m.definitions[0].definition);
            }
          });
          defEl.textContent = defs.length ? '📖 ' + defs.join('; ') : '';
        } else {
          defEl.textContent = '';
        }
      })
      .catch(function(){ var defEl = document.getElementById('reviewHintDef'); if (defEl) defEl.textContent = ''; });
  }

  const inp = document.getElementById('reviewAnswer');
  if (inp) inp.focus();
}

function toggleReviewSize() {
  reviewExpanded = !reviewExpanded;
  const overlay = document.getElementById('reviewOverlay');
  if (overlay) {
    const inner = overlay.firstElementChild;
    if (inner && inner.parentNode) inner.remove();
    overlay.remove();
  }
  showReviewCard();
  const inp = document.getElementById('reviewAnswer');
  if (inp) inp.focus();
}

function speakWord(word) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(word);
  u.lang = 'en-US';
  u.rate = 0.9;
  u.volume = 1;
  // Chrome fix: onstart/onend keep GC from collecting the utterance
  u.onstart = function(){};
  u.onend = function(){};
  u.onerror = function(e){ console.error('speak error:', e); };
  const voices = window.speechSynthesis.getVoices();
  const enVoice = voices.find(v => v.lang && (v.lang === 'en-US' || v.lang.startsWith('en')));
  if (enVoice) u.voice = enVoice;
  window.speechSynthesis.speak(u);
}
// Chrome fix: ensure voices are loaded
if (window.speechSynthesis) {
  if (speechSynthesis.getVoices().length === 0) {
    speechSynthesis.onvoiceschanged = function(){ speechSynthesis.onvoiceschanged = null; };
  }
}

function speakFromBtn(btn) {
  var w = btn.getAttribute('data-word');
  if (w) speakWord(w);
}

function fetchPhonetic(word, callback) {
  fetch('https://api.dictionaryapi.dev/api/v2/entries/en/' + encodeURIComponent(word))
    .then(r => r.ok ? r.json() : Promise.reject())
    .then(data => {
      if (data && data[0]) {
        const ph = data[0].phonetic || (data[0].phonetics && data[0].phonetics.find(p => p.text)?.text) || '';
        callback(ph);
      } else { callback(''); }
    })
    .catch(() => callback(''));
}

function syncLetterBoxes() {
  var input = document.getElementById('reviewAnswer');
  var boxes = document.querySelectorAll('#letterBoxes .lbox');
  if (!input || !boxes.length) return;
  // Cap input length to box count
  if (input.value.length > boxes.length) input.value = input.value.substring(0, boxes.length);
  var val = input.value;
  for (var i = 0; i < boxes.length; i++) {
    if (i < val.length) {
      boxes[i].textContent = val[i];
      boxes[i].className = 'lbox filled';
    } else {
      boxes[i].textContent = '_';
      boxes[i].className = 'lbox';
    }
  }
}

function checkAnswer() {
  const input = document.getElementById('reviewAnswer');
  const feedback = document.getElementById('reviewFeedback');
  const entry = reviewQueue[reviewIndex];
  if (!entry || !input) return;

  const answer = input.value.trim().toLowerCase();
  const correct = entry.wordLower.toLowerCase();

  if (answer === correct) {
    if (reviewRetry) {
      // Got it right on retry — proceed without extra stage change
      reviewRetry = false;
      feedback.innerHTML = '<span class="review-correct">✓ Correct! You got it.</span>' +
        '<button class="btn-primary" onclick="nextReview()">Next →</button>' +
        '<div class="review-word-info"><span class="word">' + escHtml(syllabify(entry.word)) + '</span> <span class="review-phonetic" id="reviewPhonetic">' + (window._lastPhonetic || '') + '</span> <button class="review-speak-btn" onclick="speakFromBtn(this)" data-word="' + entry.word.replace(/"/g, '&quot;') + '">🔊</button></div>';
      input.disabled = true;
      setTimeout(function(){ speakWord(entry.word); }, 100);
    } else {
      reviewRequeue.delete(entry.wordLower);
      updateStage(entry, true);
      reviewStats.correct++;
      feedback.innerHTML = '<span class="review-correct">✓ Correct! Stage ' + (entry.stage - 1) + ' → ' + entry.stage + ' (next in ' + SRS_INTERVALS[entry.stage] + 'd)</span>' +
        '<button class="btn-primary" onclick="nextReview()">Next →</button>' +
        '<div class="review-word-info"><span class="word">' + escHtml(syllabify(entry.word)) + '</span> <span class="review-phonetic" id="reviewPhonetic">loading...</span> <button class="review-speak-btn" onclick="speakFromBtn(this)" data-word="' + entry.word.replace(/"/g, '&quot;') + '">🔊</button></div>';
      input.disabled = true;
      fetchPhonetic(entry.word, function(ph) {
        window._lastPhonetic = ph || '';
        var el = document.getElementById('reviewPhonetic');
        if (el) el.textContent = ph || '';
      });
      setTimeout(function(){ speakWord(entry.word); }, 100);
    }
  } else {
    if (!reviewRetry) {
      // First wrong attempt — decrease stage, show answer, start retry
      reviewRequeue.add(entry.wordLower);
      updateStage(entry, false);
      reviewStats.incorrect++;
      reviewRetry = true;
      fetchPhonetic(entry.word, function(ph) { window._lastPhonetic = ph || ''; });
    }
    input.value = '';
    setTimeout(syncLetterBoxes, 0);
    if (input.className === 'review-input') input.placeholder = '✏️ Type the correct answer...';
    input.focus();
    feedback.innerHTML = '<span class="review-incorrect">✗ Wrong! Correct answer: ' + escHtml(syllabify(entry.word)) + '</span> <button class="review-speak-btn" onclick="speakFromBtn(this)" data-word="' + entry.word.replace(/"/g, '&quot;') + '">🔊</button>' +
      '<div style="width:100%;font-size:12px;color:var(--muted);">Type the correct answer above, then press Enter.</div>';
    setTimeout(function(){ speakWord(entry.word); }, 100);
  }
  // Update progress bar
  const total = reviewQueue.length;
  const done = reviewStats.correct + reviewStats.incorrect;
  const labelEl = document.getElementById('reviewLabel');
  const barFill = document.getElementById('reviewBarFill');
  if (labelEl) labelEl.textContent = (reviewIndex + 1) + ' / ' + total + '  ✓' + reviewStats.correct + ' ✗' + reviewStats.incorrect;
  if (barFill && total > 0) barFill.style.width = (done / total * 100) + '%';
