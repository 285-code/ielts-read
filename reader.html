/* ── Syllabification ── */
function syllabify(word) {
  if (!word || word.length <= 3) return word;
  if (word.indexOf(' ') !== -1) return word;
  try {
    var parts = window._syllabify.hyphenate(word.replace(/[^a-zA-ZÀ-ɏ-]/g, ''));
    if (parts && parts.length > 1) return parts.join('\xB7');
  } catch(e) {}
  return word;
}

function nextReview() {
  reviewIndex++;
  reviewRetry = false;
  showReviewCard();
  const inp = document.getElementById('reviewAnswer');
  if (inp) inp.focus();
}

function skipReviewWord() {
  const entry = reviewQueue[reviewIndex];
  if (entry) {
    vocabData.forEach(v => {
      if (v.wordLower === entry.wordLower) v.suspended = true;
    });
    saveVocab();
  }
  nextReview();
}

// DASHBOARD — Multi-article browsing
// ============================================================
function showDashboard() {
  closePopup(); closeSentenceCard();
  saveFullArticleData();
  ['articleContainer','pasteZone','inlineEdit'].forEach(id => document.getElementById(id).style.display = 'none');
  document.getElementById('articleHeader').style.display = 'none';
  const dash = document.getElementById('dashboard');
  dash.style.display = 'block';
  currentArticleId = null;

  const store = getArticleIndex();
  const ids = Object.keys(store).sort(function(a, b) {
    return (store[a].source || store[a].title || a).localeCompare(store[b].source || store[b].title || b, undefined, { numeric: true });
  });

  const trashCount = (JSON.parse(localStorage.getItem('ielts_trash') || '[]')).length;
  let html = '<div class="dash-header"><h1>📚 我的精读</h1><div style="display:flex;gap:8px;align-items:center;">' +
    (trashCount ? '<span style="font-size:12px;color:var(--muted);cursor:pointer;text-decoration:underline;" onclick="showTrash()">🗑 回收站 (' + trashCount + ')</span>' : '') +
    '<button class="btn-primary" onclick="showPasteZone()">+ 新文章</button></div></div>';

  if (!ids.length) {
    html += '<div class="empty-state"><p>还没有文章，点击上方按钮开始。</p></div>';
  } else {
    html += '<div class="dash-grid">';
    ids.forEach(id => {
      const info = store[id];
      html += '<div class="dash-card" onclick="openArticle(\'' + id + '\')">' +
        '<span class="dash-delete" onclick="event.stopPropagation();deleteArticle(\'' + id + '\')">✕</span>' +
        '<div class="dash-source">' + escHtml(info.source || info.id) + '</div>' +
        '<div class="dash-title">' + escHtml(info.title) + '</div>' +
        '<div class="dash-meta">' + info.vocabCount + ' vocab · ' + info.created + '</div>' +
        '</div>';
    });
    html += '</div>';
  }
  dash.innerHTML = html;
}

function openArticle(id) {
  saveFullArticleData();
  currentArticleId = id;
  const data = loadArticleFromStore(id);
  if (!data) { showDashboard(); return; }
  articleData = data.article;
  vocabData = data.vocab || [];
  sentenceData = data.sentences || [];
  syntaxData = data.syntax || [];
  sentenceNotes = data.notes || {};
  localStorage.setItem('ielts_last_article', id);

  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('articleContainer').style.display = 'block';
  document.getElementById('articleHeader').style.display = 'block';
  renderAll();
}

function deleteArticle(id) {
  const store = getArticleIndex();
  const info = store[id];
  const title = info?.title || id;
  if (!confirm('Delete "' + title + '" and all its data?')) return;

  // Move to trash
  const raw = localStorage.getItem(getArticleStoreKey(id));
  const trash = JSON.parse(localStorage.getItem('ielts_trash') || '[]');
  trash.push({ id, title, source: info?.source || '', deletedAt: new Date().toISOString().slice(0,10), data: raw ? JSON.parse(raw) : null });
  localStorage.setItem('ielts_trash', JSON.stringify(trash));

  localStorage.removeItem(getArticleStoreKey(id));
  delete store[id];
  saveArticleIndex(store);
  if (!Object.keys(store).length) localStorage.removeItem('ielts_last_article');
  if (currentArticleId === id) {
    currentArticleId = null; articleData = null;
    vocabData = []; sentenceData = []; syntaxData = []; sentenceNotes = {};
  }
  showDashboard();
}

function showTrash() {
  const trash = JSON.parse(localStorage.getItem('ielts_trash') || '[]');
  const dash = document.getElementById('dashboard');
  let html = '<div class="dash-header"><h1>🗑 回收站</h1><button class="btn-primary" onclick="showDashboard()">← 返回</button></div>';
  if (!trash.length) {
    html += '<div class="empty-state"><p>回收站为空</p></div>';
  } else {
    html += '<div class="dash-grid">';
    trash.forEach(function(item, i) {
      html += '<div class="dash-card">' +
        '<div class="dash-source">' + escHtml(item.source) + ' · ' + item.deletedAt + '</div>' +
        '<div class="dash-title">' + escHtml(item.title) + '</div>' +
        '<div class="dash-meta" style="margin-top:8px;display:flex;gap:8px;">' +
        '  <button class="btn-primary" style="font-size:12px;padding:4px 12px;" onclick="restoreArticle(' + i + ')">↩ 恢复</button>' +
        '  <button style="font-size:12px;padding:4px 12px;border:1px solid var(--border);border-radius:4px;background:none;cursor:pointer;" onclick="permaDelete(' + i + ')">🗑 永久删除</button>' +
        '</div></div>';
    });
    html += '</div>';
  }
  dash.innerHTML = html;
}

function restoreArticle(index) {
  const trash = JSON.parse(localStorage.getItem('ielts_trash') || '[]');
  const item = trash[index];
  if (!item) return;
  trash.splice(index, 1);
  localStorage.setItem('ielts_trash', JSON.stringify(trash));
  if (item.data) {
    localStorage.setItem(getArticleStoreKey(item.id), JSON.stringify(item.data));
    const store = getArticleIndex();
    store[item.id] = { id: item.id, title: item.title, source: item.source, created: item.data.article?.date || item.deletedAt, modified: item.deletedAt, vocabCount: (item.data.vocab || []).length, sentCount: (item.data.sentences || []).length };
    saveArticleIndex(store);
  }
  showTrash();
}

function permaDelete(index) {
  if (!confirm('永久删除这篇文章？不可恢复。')) return;
  const trash = JSON.parse(localStorage.getItem('ielts_trash') || '[]');
  trash.splice(index, 1);
  localStorage.setItem('ielts_trash', JSON.stringify(trash));
  showTrash();
}

      store[id] = { id, title: d.article.title, source: d.article.source || '', created: '2026-05-11', modified: '2026-05-11', vocabCount: (d.vocab||[]).length, sentCount: (d.sentences||[]).length };
      saveArticleIndex(store);
      localStorage.setItem('ielts_article_' + id, JSON.stringify({ article: d.article, vocab: d.vocab || [], sentences: d.sentences || [], syntax: d.syntax || [], notes: d.sentenceNotes || {} }));
    }
  }
  if (typeof SEED_T2 !== 'undefined') {
    const store = getArticleIndex();
    if (!store['ielts-11-t2']) {
      const d = SEED_T2;
      const id = 'ielts-11-t2';
      store[id] = { id, title: d.article.title, source: d.article.source || '', created: '2026-05-27', modified: '2026-05-27', vocabCount: (d.vocab||[]).length, sentCount: (d.sentences||[]).length };
      saveArticleIndex(store);
      localStorage.setItem('ielts_article_' + id, JSON.stringify({ article: d.article, vocab: d.vocab || [], sentences: d.sentences || [], syntax: d.syntax || [], notes: d.sentenceNotes || {} }));
    }
  }
  // Re-load if data was just seeded (no article was loaded initially)
  if (!currentArticleId && Object.keys(getArticleIndex()).length) {
    const store = getArticleIndex();
    const lastId = Object.keys(store)[0];
    currentArticleId = lastId;
    const data = loadArticleFromStore(lastId);
    if (data) {
      articleData = data.article;
      vocabData = data.vocab || [];
      sentenceData = data.sentences || [];
      syntaxData = data.syntax || [];
      sentenceNotes = data.notes || {};
    }
  }
})();
// Fix phrase wordLower that lost spaces
vocabData.forEach(function(v) {
  if (v.wordIndices && v.word && v.wordLower && v.word.indexOf(' ') !== -1 && v.wordLower.indexOf(' ') === -1) {
    v.wordLower = v.word.toLowerCase();
  }
});
// Auto-save + auto-sync on page close
window.addEventListener('beforeunload', () => { saveFullArticleData(); syncOnClose(); });
if (articleData) {
  renderAll();
} else {
  showDashboard();
}
// Auto-pull on load if auto-sync is enabled
setTimeout(function() {
  var cb = document.getElementById('autoSyncCheck');
  if (cb && cb.checked && getGithubToken()) {
    var t = getGithubToken();
    fetch('https://api.github.com/repos/' + SYNC_OWNER + '/' + SYNC_REPO + '/contents/' + SYNC_PATH, {
      headers: { 'Authorization': 'Bearer ' + t }
    })
      .then(function(r) {
        if (r.status === 404) return null;
        if (!r.ok) return null;
        return r.json();
      })
      .then(function(j) {
        if (!j || !j.content) return;
        var data = JSON.parse(decodeURIComponent(escape(atob(j.content.replace(/\s/g,'')))));
        if (data && data.index) { mergeSyncData(data); location.reload(); }
      })
      .catch(function() {});
  }
}, 500);
</script>
